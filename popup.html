<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Saver</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">

    <header class="masthead">
      <h1 class="masthead-title">Scroll Saver</h1>
      <div class="masthead-rule"></div>
      <p class="masthead-tagline">Your reading positions, remembered.</p>
    </header>

    <section class="card">
      <div class="card-header">
        <h2 class="card-label">Current Page</h2>
        <button id="add-page" class="btn btn-add">Add</button>
      </div>
      <div class="card-body">
        <div id="current-info">
          <p class="entry-loading">Loading&hellip;</p>
        </div>
        <div class="entry-actions">
          <button id="refresh" class="btn">Refresh</button>
          <button id="clear-current" class="btn btn-danger" disabled>Delete</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2 class="card-label">Stored</h2>
        <div class="card-header-right">
          <span class="card-count"><span id="stats-count">0</span> positions</span>
          <button id="clear-all" class="btn-text">Delete all</button>
        </div>
      </div>
      <div id="positions-list">
        <p class="empty-state">No saved positions yet</p>
      </div>
    </section>

    <footer class="footer">
      <p class="footer-help">Saves your scroll position on articles. On YouTube channels, remembers the last video you clicked. Restores when you return.</p>
      <div class="footer-actions">
        <button id="export-log" class="btn btn-utility">Export Log</button>
        <button id="theme-toggle" class="btn btn-utility">Dark</button>
      </div>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>

</html>
