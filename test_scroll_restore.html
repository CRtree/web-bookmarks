<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Scroll Saver Test</title>
<style>
  /* Mimic YouTube: body height=0, all visible content in position:absolute ytd-app */
  body {
    margin: 0;
    height: 0;
    overflow: scroll;
  }
  /* The actual content ŌĆö position:absolute so it doesn't contribute to body.scrollHeight */
  ytd-app {
    position: absolute;
    top: 0; left: 0; width: 100%;
    display: block;
  }
  .spacer { height: 1000px; }
  .marker { background: red; color: white; padding: 10px; }
</style>
</head>
<body>
  <ytd-app>
    <div class="spacer"></div>
    <div class="marker" id="marker">Ō¼ć TARGET POSITION (~1000px) Ō¼ć</div>
    <div class="spacer"></div>
    <div class="spacer"></div>
    <div class="spacer"></div>
  </ytd-app>

<script>
// === Scroll Saver logic (copy of content.js) ===
const SCROLL_SAVE_DEBOUNCE_MS = 1000;
let currentUrl = window.location.href;
let scrollTimeout = null;
let isRestoring = false;
let lastSavedPosition = 0;
let isTrackingActive = false;
let progressiveScrollTimer = null;

// In-memory storage for testing
const testStorage = {};
window.chrome = {
  storage: {
    local: {
      get: (keys, cb) => {
        const result = {};
        if (keys === null) { Object.assign(result, testStorage); }
        else { keys.forEach(k => { if (testStorage[k]) result[k] = testStorage[k]; }); }
        setTimeout(() => cb(result), 0);
      },
      set: (obj, cb) => {
        Object.assign(testStorage, obj);
        setTimeout(() => cb(), 0);
      },
    }
  },
  runtime: { id: 'test', lastError: null }
};

function normalizeUrl(url) {
  try { const u = new URL(url); u.search = ''; u.hash = ''; return u.toString(); }
  catch (e) { return url; }
}
function isExtensionValid() { return true; }
function getStorageKey(url) { return `reading_position_${normalizeUrl(url)}`; }
function getScrollContainer() { return null; }

function getScrollPosition() {
  const container = getScrollContainer();
  let maxScroll, scrollY;
  if (container && container !== document.body) {
    scrollY = container.scrollTop;
    maxScroll = container.scrollHeight - container.clientHeight;
  } else {
    scrollY = window.scrollY;
    const docHeight = Math.max(
      document.body.scrollHeight, document.documentElement.scrollHeight,
      document.body.offsetHeight, document.documentElement.offsetHeight
    );
    maxScroll = docHeight - window.innerHeight;
  }
  let scrollPercent = maxScroll > 0 ? Math.min(100, Math.max(0, (scrollY / maxScroll) * 100)) : 0;
  return { scrollY, scrollPercent, timestamp: Date.now(), url: currentUrl, title: document.title };
}

function saveScrollPosition(position) {
  if (position.scrollY < 100 && position.scrollPercent < 5) return;
  if (Math.abs(position.scrollY - lastSavedPosition) < 50) return;
  if (!isExtensionValid()) return;
  const key = getStorageKey(currentUrl);
  chrome.storage.local.set({ [key]: position }, () => { lastSavedPosition = position.scrollY; });
}

function cleanupProgressiveScroll() {
  if (progressiveScrollTimer) { clearTimeout(progressiveScrollTimer); progressiveScrollTimer = null; }
}

// ­¤Éø BUG FIXED ŌĆö no longer aborts self via progressiveScrollActive
function progressiveScrollToPosition(targetScrollY, attempt) {
  attempt = attempt || 0;
  const MAX_ATTEMPTS = 40;
  const RETRY_DELAY = 50;
  const container = getScrollContainer();
  const isCustomContainer = container && container !== document.body;
  if (attempt >= MAX_ATTEMPTS) { cleanupProgressiveScroll(); isRestoring = false; return; }
  if (!isExtensionValid()) { cleanupProgressiveScroll(); return; }
  const effectiveHeight = isCustomContainer
    ? container.scrollHeight
    : Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
  const maxScroll = Math.max(0, effectiveHeight - (isCustomContainer ? container.clientHeight : window.innerHeight));
  const scrollTarget = Math.min(targetScrollY, maxScroll);
  if (isCustomContainer) {
    container.scrollTo({ top: scrollTarget });
  } else {
    window.scrollTo({ top: scrollTarget });
  }
  const currentY = isCustomContainer ? container.scrollTop : window.scrollY;
  if (currentY >= targetScrollY - 100) { cleanupProgressiveScroll(); isRestoring = false; return; }
  (isCustomContainer ? container : window).dispatchEvent(new Event('scroll', { bubbles: true }));
  progressiveScrollTimer = setTimeout(() => progressiveScrollToPosition(targetScrollY, attempt + 1), RETRY_DELAY);
}

function restoreScrollPosition(urlOverride) {
  const targetUrl = urlOverride || currentUrl;
  if (isRestoring) return;
  if (!isExtensionValid()) return;
  const key = getStorageKey(targetUrl);
  chrome.storage.local.get([key], (result) => {
    const saved = result[key];
    if (!saved || !saved.scrollY) return;
    const container = getScrollContainer();
    const isCustomContainer = container && container !== document.body;
    const currentScroll = isCustomContainer ? container.scrollTop : window.scrollY;
    if (currentScroll > saved.scrollY + 100) return;
    const effectiveHeight = isCustomContainer
      ? container.scrollHeight
      : Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
    const maxScroll = effectiveHeight - (isCustomContainer ? container.clientHeight : window.innerHeight);
    const containerHeight = effectiveHeight;
    if (saved.scrollY > maxScroll + 500) {
      isRestoring = true;
      progressiveScrollToPosition(saved.scrollY);
    } else {
      isRestoring = true;
      if (isCustomContainer) {
        container.scrollTo({ top: saved.scrollY, behavior: 'smooth' });
      } else {
        window.scrollTo({ top: saved.scrollY, behavior: 'smooth' });
      }
      let scrollSettleChecks = 0;
      const checkScrollSettled = () => {
        const currentY = isCustomContainer ? container.scrollTop : window.scrollY;
        if (currentY >= Math.max(saved.scrollY - 50, 0) || scrollSettleChecks >= 75) {
          isRestoring = false;
          return;
        }
        scrollSettleChecks++;
        setTimeout(checkScrollSettled, 200);
      };
      setTimeout(checkScrollSettled, 500);
    }
  });
}

function handleScroll() {
  if (isRestoring) return;
  if (scrollTimeout) clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(() => {
    if (!isTrackingActive) return;
    if (isRestoring) return;
    saveScrollPosition(getScrollPosition());
  }, SCROLL_SAVE_DEBOUNCE_MS);
}

function setupTracking() {
  if (isTrackingActive) return;
  isTrackingActive = true;
  window.addEventListener('scroll', handleScroll, { passive: true });
  window.addEventListener('beforeunload', () => { if (isTrackingActive) saveScrollPosition(getScrollPosition()); });
  const urlAtTrackStart = currentUrl;
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => { setTimeout(() => restoreScrollPosition(urlAtTrackStart), 300); });
  } else {
    setTimeout(() => restoreScrollPosition(urlAtTrackStart), 500);
  }
}

function isArticlePage() { return true; }
function isYouTubeChannelPage() { return document.location.pathname.startsWith('/@'); }

// === TEST RUNNER ===
window.runTest = async function() {
  const results = [];
  const resultsEl = document.getElementById('results');

  function log(r) {
    results.push(r);
    resultsEl.textContent = results.map(x => (x.pass ? 'Ō£ģ' : 'ŌØī') + ' ' + x.name + ': ' + x.detail).join('\n');
  }

  // Verify the test environment mimics YouTube
  log({
    name: 'Test env: body.scrollHeight=0, docEl.scrollHeight>0',
    pass: document.body.scrollHeight === 0 && document.documentElement.scrollHeight > 500,
    detail: `body=${document.body.scrollHeight}, docEl=${document.documentElement.scrollHeight}`
  });

  // TEST 1: getScrollPosition correctly uses documentElement
  const pos = getScrollPosition();
  log({
    name: 'getScrollPosition returns correct maxScroll',
    pass: pos.scrollY === 0 && pos.scrollPercent === 0,
    detail: `scrollY=${pos.scrollY}`
  });

  // TEST 2: Save position at 1200px
  window.scrollTo(0, 1200);
  const savedPos = getScrollPosition();
  saveScrollPosition(savedPos);
  log({
    name: 'Position saved at 1200px',
    pass: savedPos.scrollY >= 1200,
    detail: `scrollY=${savedPos.scrollY}, percent=${savedPos.scrollPercent.toFixed(1)}%`
  });

  // TEST 3: Scroll back to top, then restore ŌĆö THIS SHOULD NOW PASS (FIXED)
  window.scrollTo(0, 0);
  await new Promise(r => setTimeout(r, 300));
  isRestoring = false;
  restoreScrollPosition();

  await new Promise(r => setTimeout(r, 4500)); // wait for progressive scroll (40 * 50ms + buffer)

  const finalScrollY = window.scrollY;
  log({
    name: 'Scroll restored to ~1200px',
    pass: finalScrollY >= 1100,
    detail: `Expected >=1100, got ${finalScrollY} (body.scrollHeight=${document.body.scrollHeight}, docEl=${document.documentElement.scrollHeight})`
  });
};

window.addEventListener('load', () => {
  setupTracking();
  setTimeout(window.runTest, 200);
});
</script>
<pre id="results" style="position: fixed; top: 0; right: 0; background: #222; color: #0f0; padding: 20px; font: 14px monospace; z-index: 999; max-width: 600px;">Running tests...</pre>
</body>
</html>
